name: Timer
version: '1.0-SNAPSHOT'
main: de.thecoolcraft11.timer.Timer
api-version: '1.21'
author: TheCoolcraft11
description: A simple timer plugin
website: https://github.com/TheCoolcraft11/Timer

commands:
  timer:
    description: Control the timer plugin
    usage: /timer <start|stop|pause|resume|reset|set|mode|target|info|save|reload|help>
    permission: timer.use
  reset:
    description: Reset the world (overworld, nether, and end) with optional seed
    usage: /reset [seed]
    permission: timer.admin

permissions:
  timer.use:
    description: Allows use of timer commands
    default: op
  timer.admin:
    description: Full timer administration
    default: op
    children:
      timer.use: true


